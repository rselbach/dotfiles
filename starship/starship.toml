add_newline = false
command_timeout = 1000
palette = "tokyonight"
format = "$hostname${custom.jj}$directory $character"

[character]
success_symbol = "[➜](green)"
error_symbol = "[➜](red)"
vicmd_symbol = "[N](mauve) [➜](green)"

[directory]
style = "blue"
truncation_length = 4
truncate_to_repo = true

[git_branch]
disabled = true

[git_status]
disabled = true

[custom.jj]
when = "jj-starship detect"
shell = ["jj-starship"]
format = "$output "

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "green bold"

[palettes.tokyonight]
rosewater = "#f7768e"
flamingo = "#f7768e"
pink = "#bb9af7"
mauve = "#bb9af7"
red = "#f7768e"
maroon = "#f7768e"
peach = "#ff9e64"
yellow = "#e0af68"
green = "#9ece6a"
teal = "#73daca"
sky = "#7dcfff"
sapphire = "#2ac3de"
blue = "#7aa2f7"
lavender = "#bb9af7"
text = "#c0caf5"
subtext1 = "#a9b1d6"
subtext0 = "#9aa5ce"
overlay2 = "#565f89"
overlay1 = "#565f89"
overlay0 = "#414868"
